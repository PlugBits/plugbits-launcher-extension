name = "plugbits-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "LICENSES"
id = "YOUR_KV_NAMESPACE_ID"          # `wrangler kv:namespace create LICENSES` で取得
preview_id = "YOUR_KV_PREVIEW_ID"    # preview 用

[vars]
ALLOWED_ORIGIN = "chrome-extension://YOUR_EXTENSION_ID"

# Secrets（wrangler secret put で登録）:
#   STRIPE_SECRET_KEY       = sk_live_...
#   STRIPE_WEBHOOK_SECRET   = whsec_...
#   BREVO_API_KEY           = xkeysib-...
#   BREVO_SENDER_EMAIL      = no-reply@plugbits.app
#   BREVO_SENDER_NAME       = PlugBits Launcher
